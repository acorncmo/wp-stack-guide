<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 496" font-family="'Public Sans', system-ui, sans-serif">
  <defs>
    <marker id="arr-brown" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 1 L 10 6 L 0 11 z" fill="#250F04"/>
    </marker>
    <marker id="arr-olive" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 1 L 10 6 L 0 11 z" fill="#47470E"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 1 L 10 6 L 0 11 z" fill="#25495C"/>
    </marker>
    <marker id="arr-blue-rev" viewBox="0 0 12 12" refX="2" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 12 1 L 2 6 L 12 11 z" fill="#25495C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="496" fill="#FFFFFF" rx="12"/>

  <!-- Title -->
  <text x="500" y="32" text-anchor="middle" font-size="18" font-weight="800" fill="#250F04" letter-spacing="-0.02em">What Lives Where</text>


  <!-- ============================== -->
  <!-- COLUMN 1: LOCAL (20–310)       -->
  <!-- ============================== -->
  <rect x="20" y="56" width="290" height="300" rx="10" fill="#250F04"/>
  <rect x="20" y="56" width="290" height="40" rx="10" fill="#250F04"/>
  <rect x="20" y="90" width="290" height="2" fill="#3F1906"/>
  <text x="165" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#B8D6E5" letter-spacing="0.04em">LOCAL</text>
  <text x="165" y="113" text-anchor="middle" font-size="9" fill="#A09B81">LocalWP · your computer</text>

  <!-- WordPress Core -->
  <rect x="36" y="126" width="258" height="36" rx="6" fill="#59301B"/>
  <text x="165" y="149" text-anchor="middle" font-size="11" font-weight="600" fill="#E5DEB8">WordPress Core</text>

  <!-- Plugins -->
  <rect x="36" y="172" width="124" height="30" rx="6" fill="#735950"/>
  <text x="98" y="191" text-anchor="middle" font-size="10" font-weight="600" fill="#EDE8CD">Plugins</text>
  <text x="98" y="212" text-anchor="middle" font-size="7.5" fill="#A09B81">installed via WP Admin</text>

  <!-- Uploads -->
  <rect x="170" y="172" width="124" height="30" rx="6" fill="#735950"/>
  <text x="232" y="191" text-anchor="middle" font-size="10" font-weight="600" fill="#EDE8CD">Uploads</text>
  <text x="232" y="212" text-anchor="middle" font-size="7.5" fill="#A09B81">media library or SFTP</text>

  <!-- Theme (highlighted) -->
  <rect x="36" y="226" width="258" height="114" rx="8" fill="#B8D6E5" stroke="#25495C" stroke-width="2"/>
  <text x="165" y="254" text-anchor="middle" font-size="14" font-weight="700" fill="#250F04">Theme</text>
  <text x="165" y="272" text-anchor="middle" font-size="9" fill="#25495C">templates · blocks · styles · config</text>
  <text x="165" y="288" text-anchor="middle" font-size="9" fill="#25495C">functions.php · CLAUDE.md</text>
  <text x="165" y="324" text-anchor="middle" font-size="9" font-weight="700" fill="#25495C">This is what you build</text>


  <!-- ============================== -->
  <!-- ARROW: LOCAL → GITHUB          -->
  <!-- ============================== -->
  <line x1="310" y1="283" x2="366" y2="283" stroke="#250F04" stroke-width="3" marker-end="url(#arr-brown)"/>
  <rect x="316" y="251" width="46" height="26" rx="5" fill="#250F04"/>
  <text x="339" y="263" text-anchor="middle" font-size="8" font-weight="700" fill="#B8D6E5">git</text>
  <text x="339" y="273" text-anchor="middle" font-size="8" font-weight="700" fill="#B8D6E5">push</text>


  <!-- ============================== -->
  <!-- COLUMN 2: GITHUB (375–625)     -->
  <!-- ============================== -->
  <rect x="375" y="56" width="250" height="300" rx="10" fill="#FFFFFF" stroke="#250F04" stroke-width="2"/>
  <rect x="375" y="90" width="250" height="2" fill="#250F04"/>
  <text x="500" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#250F04" letter-spacing="0.04em">GITHUB</text>
  <text x="500" y="113" text-anchor="middle" font-size="9" fill="#735950">version control · single source of truth</text>

  <!-- Not here indicators -->
  <rect x="391" y="126" width="218" height="36" rx="6" fill="#F5F2E3"/>
  <text x="500" y="149" text-anchor="middle" font-size="10" fill="#A09B81">WordPress Core — not in repo</text>

  <rect x="391" y="172" width="124" height="30" rx="6" fill="#F5F2E3"/>
  <text x="453" y="191" text-anchor="middle" font-size="10" fill="#A09B81">Plugins — no</text>

  <rect x="525" y="172" width="84" height="30" rx="6" fill="#F5F2E3"/>
  <text x="567" y="191" text-anchor="middle" font-size="10" fill="#A09B81">Uploads — no</text>

  <!-- Theme (highlighted — only thing here) -->
  <rect x="391" y="226" width="218" height="114" rx="8" fill="#B8D6E5" stroke="#25495C" stroke-width="2"/>
  <text x="500" y="254" text-anchor="middle" font-size="14" font-weight="700" fill="#250F04">Theme</text>
  <text x="500" y="278" text-anchor="middle" font-size="10" font-weight="600" fill="#25495C">The only thing in the repo</text>

  <!-- Deploy methods -->
  <text x="500" y="310" text-anchor="middle" font-size="8" fill="#25495C">Deploy via: SFTP · git push · rsync</text>
  <text x="500" y="324" text-anchor="middle" font-size="8" fill="#25495C">SiteGround · WP Engine · Cloudways</text>


  <!-- ============================== -->
  <!-- ARROW: GITHUB → HOST           -->
  <!-- ============================== -->
  <line x1="625" y1="283" x2="681" y2="283" stroke="#47470E" stroke-width="3" marker-end="url(#arr-olive)"/>
  <rect x="629" y="251" width="50" height="26" rx="5" fill="#47470E"/>
  <text x="654" y="268" text-anchor="middle" font-size="8" font-weight="700" fill="#E0E0A7">deploy</text>


  <!-- ============================== -->
  <!-- COLUMN 3: PRODUCTION (690–980) -->
  <!-- ============================== -->
  <rect x="690" y="56" width="290" height="300" rx="10" fill="#25495C"/>
  <rect x="690" y="56" width="290" height="40" rx="10" fill="#25495C"/>
  <rect x="690" y="90" width="290" height="2" fill="#7090A0"/>
  <text x="835" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#B8D6E5" letter-spacing="0.04em">PRODUCTION</text>
  <text x="835" y="113" text-anchor="middle" font-size="9" fill="#7090A0">SiteGround · WP Engine · Cloudways</text>

  <!-- WordPress Core -->
  <rect x="706" y="126" width="258" height="36" rx="6" fill="#3B6B82"/>
  <text x="835" y="149" text-anchor="middle" font-size="11" font-weight="600" fill="#E3EFF5">WordPress Core</text>

  <!-- Plugins -->
  <rect x="706" y="172" width="124" height="30" rx="6" fill="#3B6B82"/>
  <text x="768" y="191" text-anchor="middle" font-size="10" font-weight="600" fill="#E3EFF5">Plugins</text>
  <text x="768" y="212" text-anchor="middle" font-size="7.5" fill="#7090A0">installed via WP Admin</text>

  <!-- Uploads -->
  <rect x="840" y="172" width="124" height="30" rx="6" fill="#3B6B82"/>
  <text x="902" y="191" text-anchor="middle" font-size="10" font-weight="600" fill="#E3EFF5">Uploads</text>
  <text x="902" y="212" text-anchor="middle" font-size="7.5" fill="#7090A0">media library or SFTP</text>

  <!-- Theme (highlighted) -->
  <rect x="706" y="226" width="258" height="114" rx="8" fill="#B8D6E5" stroke="#FFFFFF" stroke-width="2"/>
  <text x="835" y="254" text-anchor="middle" font-size="14" font-weight="700" fill="#250F04">Theme</text>
  <text x="835" y="272" text-anchor="middle" font-size="9" fill="#25495C">Same files as local, plus vendor/</text>
  <text x="835" y="288" text-anchor="middle" font-size="9" fill="#25495C">deployed from GitHub</text>
  <text x="835" y="324" text-anchor="middle" font-size="9" font-weight="700" fill="#25495C">Identical to what you built</text>


  <!-- ============================== -->
  <!-- DATABASE MIGRATION BAND        -->
  <!-- ============================== -->
  <rect x="20" y="378" width="960" height="76" rx="8" fill="#E3EFF5" stroke="#B8D6E5" stroke-width="1.5"/>

  <text x="500" y="398" text-anchor="middle" font-size="11" font-weight="700" fill="#25495C" letter-spacing="0.03em">DATABASE</text>

  <!-- Arrow: local → production (deploy) -->
  <line x1="100" y1="416" x2="900" y2="416" stroke="#25495C" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="310" y="406" width="380" height="20" rx="4" fill="#FFFFFF" stroke="#B8D6E5" stroke-width="1"/>
  <text x="500" y="420" text-anchor="middle" font-size="8" fill="#25495C">wp db export → wp db import → wp search-replace 'local-url' 'live-url'</text>

  <!-- Arrow: production → local (sync content) -->
  <line x1="900" y1="440" x2="100" y2="440" stroke="#25495C" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="310" y="430" width="380" height="20" rx="4" fill="#FFFFFF" stroke="#B8D6E5" stroke-width="1"/>
  <text x="500" y="444" text-anchor="middle" font-size="8" fill="#25495C">wp db export → wp db import → wp search-replace 'live-url' 'local-url'</text>


  <!-- ============================== -->
  <!-- LEGEND                          -->
  <!-- ============================== -->
  <rect x="20" y="468" width="960" height="22" rx="4" fill="#F5F2E3"/>
  <g font-size="9" fill="#735950">
    <rect x="40" y="473" width="12" height="12" rx="3" fill="#B8D6E5" stroke="#25495C" stroke-width="1.5"/>
    <text x="58" y="483">Your theme (flows through Git)</text>

    <line x1="228" y1="479" x2="252" y2="479" stroke="#250F04" stroke-width="2.5" marker-end="url(#arr-brown)"/>
    <text x="262" y="483">git push</text>

    <line x1="328" y1="479" x2="352" y2="479" stroke="#47470E" stroke-width="2.5" marker-end="url(#arr-olive)"/>
    <text x="362" y="483">deploy</text>

    <line x1="418" y1="479" x2="442" y2="479" stroke="#25495C" stroke-width="2" marker-end="url(#arr-blue)"/>
    <text x="452" y="483">database (bidirectional)</text>

    <rect x="624" y="473" width="12" height="12" rx="3" fill="#735950"/>
    <text x="642" y="483">managed per-environment (not in Git)</text>
  </g>
</svg>
